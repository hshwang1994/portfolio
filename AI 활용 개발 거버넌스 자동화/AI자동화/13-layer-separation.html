<!DOCTYPE html><html><head><meta charset="utf-8"><style>

<svg width="1280" height="610" viewBox="0 0 1280 610" xmlns="http://www.w3.org/2000/svg">

<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0 1L9 5L0 9z" fill="#B85450"/></marker>
<marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0 1L9 5L0 9z" fill="#6FA253"/></marker>

<rect width="1280" height="610" fill="#FFFFFF"/>
<text x="60" y="48" font-size="27" font-weight="700" fill="#1F2937">3계층 분리 — 의도, 데이터, 실행</text>
<text x="60" y="78" font-size="16" fill="#54607A">신규 고객사나 규칙이 들어와도 검증 코드를 건드리지 않고 데이터만 바꾼다.</text>
<rect x="120" y="132" width="700" height="98" rx="6" fill="#FFFFFF" stroke="#7A8699" stroke-width="1.8"/>
<text x="136" y="161" font-size="18" font-weight="700" fill="#1F2937">rules (.md) — 의도</text>
<text x="136" y="183" font-size="14" fill="#54607A">왜 막나. 사람이 읽고 판단한다. (34종)</text>
<rect x="120" y="274" width="700" height="98" rx="6" fill="#FFFFFF" stroke="#7A8699" stroke-width="1.8"/>
<text x="136" y="303" font-size="18" font-weight="700" fill="#1F2937">policy (.yaml) — 데이터</text>
<text x="136" y="325" font-size="14" fill="#54607A">무엇을 막나. 고객사, 경로, 등급 목록. (12종)</text>
<rect x="120" y="416" width="700" height="98" rx="6" fill="#FFFFFF" stroke="#7A8699" stroke-width="1.8"/>
<text x="136" y="445" font-size="18" font-weight="700" fill="#1F2937">git hook (.py) — 실행</text>
<text x="136" y="467" font-size="14" fill="#54607A">어떻게 막나. staged 파일을 자동 검사. (29개)</text>
<path d="M 470.0 230 L 470.0 274" fill="none" stroke="#3B4658" stroke-width="2.0" marker-end="url(#a)"/>
<rect x="436.0" y="241" width="68.0" height="21" rx="3" fill="#FFFFFF"/>
<text x="470.0" y="256" font-size="13" fill="#54607A" text-anchor="middle">참조한다</text>
<path d="M 470.0 372 L 470.0 416" fill="none" stroke="#3B4658" stroke-width="2.0" marker-end="url(#a)"/>
<rect x="425.65" y="383" width="88.7" height="21" rx="3" fill="#FFFFFF"/>
<text x="470.0" y="398" font-size="13" fill="#54607A" text-anchor="middle">불러와 검사</text>
<rect x="884" y="137" width="344" height="88" rx="6" fill="#DAE8FC" stroke="#5E80AE" stroke-width="1.8"/>
<text x="900" y="166" font-size="15.5" font-weight="700" fill="#1F2937">신규 고객사 = policy 한 블록</text>
<text x="900" y="188" font-size="13" fill="#54607A">검증 코드(.py)는 그대로 둔다.</text>
<text x="900" y="207" font-size="13" fill="#54607A">다른 사람 작업에 영향이 없다.</text>
<path d="M 820 181.0 L 884 181.0" fill="none" stroke="#3B4658" stroke-width="2.0" stroke-dasharray="6 5" marker-end="url(#a)"/>
<rect x="884" y="421" width="344" height="88" rx="6" fill="#D5E8D4" stroke="#6FA253" stroke-width="1.8"/>
<text x="900" y="450" font-size="15.5" font-weight="700" fill="#1F2937">차단 또는 통과</text>
<text x="900" y="472" font-size="13" fill="#54607A">위반이면 commit을 막고 고치게,</text>
<text x="900" y="491" font-size="13" fill="#54607A">아니면 그대로 진행.</text>
<path d="M 820 465.0 L 884 465.0" fill="none" stroke="#3B4658" stroke-width="2.0" marker-end="url(#a)"/>
